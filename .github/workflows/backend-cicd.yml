name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  # 2. The Quality Check (CI)
  build-and-test:
    runs-on: ubuntu-latest
    
    # --- NEW: Spin up a temporary Redis server for the tests! ---
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    # ------------------------------------------------------------

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Assuming Node 18, change if you use a different version

      - name: Install Dependencies
        working-directory: ./backend
        run: npm install

      - name: Run Tests
        working-directory: ./backend
        run: npm test --if-present 

  # 3. The Delivery Truck (CD)
  deploy-to-render:
    needs: build-and-test # This ensures deployment ONLY happens if tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}