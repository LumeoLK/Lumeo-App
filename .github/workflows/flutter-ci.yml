name: Flutter CI Pipeline

# 1. Wake the robot up when code is pushed to master or dev
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Install Java (Required to build Android apps)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      # 3. Install Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0" # Uses a recent stable Flutter version
          channel: "stable"

      # 4. Get Packages
      - name: Install Dependencies
        working-directory: ./demo # <--- CHANGE THIS if your pubspec.yaml is in a different folder!
        run: flutter pub get

      # 5. The Quality Check (Fails if there are syntax errors)
      - name: Analyze Code
        working-directory: ./demo
        run: flutter analyze

      # 6. The Build Test (Proves the app can actually compile)
      - name: Build Android APK
        working-directory: ./demo
        run: flutter build apk --debug
