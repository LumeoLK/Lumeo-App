name: Flutter CI Pipeline

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java (Android build requirement)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # 3. Setup Flutter + cache
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      # 4. Disable analytics (fix your issue)
      - name: Disable Flutter Analytics
        run: flutter config --no-analytics

      # 5. Install dependencies
      - name: Install Dependencies
        working-directory: ./demo
        run: flutter pub get

      # 6. Static analysis
      - name: Analyze Code
        working-directory: ./demo
        run: flutter analyze

      # 7. Build APK
      - name: Build Android APK
        working-directory: ./demo
        run: flutter build apk --debug