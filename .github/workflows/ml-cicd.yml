name: ML Service CI/CD

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: |
          python -m pytest -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git clone https://lumeoCS14:${HF_TOKEN}@huggingface.co/spaces/lumeoCS14/lumeo-ml-v2 hf-space

          rm -f hf-space/README.md
          rm -f hf-space/app.py
          rm -f hf-space/requirements.txt

          cp ml/README.md hf-space/README.md
          cp ml/ml_service.py hf-space/app.py
          cp ml/requirements.txt hf-space/requirements.txt

          if [ -f ml/Dockerfile ]; then cp ml/Dockerfile hf-space/Dockerfile; fi

          cd hf-space
          echo "----- README CONTENT -----"
          cat README.md
          git add .
          git commit -m "Deploy ML service from GitHub Actions" || echo "No changes to commit"
          git push origin main --force
